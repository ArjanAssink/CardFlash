<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Klank Kaarten!</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5C35C8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Klank Kaarten">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --cw: clamp(135px, min(37vw, 30dvh), 290px);
      --ch: calc(var(--cw) * 1.4);
      --cr: clamp(12px, 2.5vw, 20px);
      --gap: clamp(18px, 4.5vw, 56px);
    }

    body {
      font-family: 'Trebuchet MS', 'Comic Sans MS', Arial, sans-serif;
      background: linear-gradient(160deg, #5C35C8 0%, #C0392B 100%);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      user-select: none;
      touch-action: manipulation;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(8px, 1.8dvh, 20px) clamp(14px, 3.5vw, 40px);
      flex-shrink: 0;
    }
    h1 {
      font-size: clamp(18px, 4vw, 38px);
      color: #fff;
      text-shadow: 3px 3px 0 rgba(0,0,0,.25);
      letter-spacing: 1px;
    }
    #timer-box {
      background: rgba(0,0,0,.28);
      border-radius: 12px;
      padding: 5px 13px;
      min-width: clamp(68px, 13vw, 108px);
      text-align: center;
    }
    #timer {
      font-size: clamp(17px, 3.8vw, 30px);
      color: #FFD93D;
      font-weight: 900;
      text-shadow: 2px 2px 0 rgba(0,0,0,.3);
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    /* ── PROGRESS ── */
    #progress-area {
      flex-shrink: 0;
      width: 100%;
      padding: 0 clamp(18px, 4.5vw, 56px);
      margin-bottom: clamp(6px, 1.5dvh, 16px);
    }
    #progress-text {
      display: block;
      text-align: center;
      color: rgba(255,255,255,.92);
      font-size: clamp(11px, 2.2vw, 18px);
      font-weight: bold;
      margin-bottom: 6px;
    }
    #progress-track {
      height: 8px;
      background: rgba(255,255,255,.2);
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD93D, #FF6B6B);
      border-radius: 4px;
      width: 0%;
      transition: width .4s ease;
    }

    /* ── GAME AREA ── */
    #game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap);
      width: 100%;
      padding: 0 clamp(12px, 3vw, 40px);
      position: relative;           /* fly-wrap positioned relative to this */
      overflow: visible;
    }

    /* ── STACK WRAPPERS ── */
    .stack-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(7px, 1.5dvh, 14px);
    }
    .stack-label {
      font-size: clamp(11px, 2.2vw, 17px);
      font-weight: bold;
      color: rgba(255,255,255,.7);
      text-align: center;
      letter-spacing: .5px;
    }

    /* ── STACK (shared container) ── */
    .stack {
      position: relative;
      width: var(--cw);
      height: var(--ch);
    }

    /* ── GHOST CARDS ── */
    .ghost {
      position: absolute;
      inset: 0;
      border-radius: var(--cr);
      border: 3px solid rgba(255,255,255,.15);
      box-shadow: 0 6px 20px rgba(0,0,0,.38);
      transition: opacity .3s;
    }
    /* Deck ghosts – face down dark */
    .ghost-deck {
      background: linear-gradient(148deg, #2A2A82, #19195A);
    }
    /* Negative Y so ghost cards peek *above* the main card, not below.
       This keeps both stacks' bottom edges flush with --ch (no overflow down). */
    #g1 { z-index: 1; transform: rotate(-4deg)  translate(-8px, -8px); opacity: .55; }
    #g2 { z-index: 2; transform: rotate(3deg)   translate(6px,  -5px); opacity: .72; }
    #g3 { z-index: 3; transform: rotate(-1.5deg) translate(-2px, -2px); opacity: .88; }

    /* Discard ghosts – lighter */
    .ghost-done {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.18);
    }
    #dg1 { z-index: 1; transform: rotate(4deg)   translate(7px,  -8px); opacity: 0; }
    #dg2 { z-index: 2; transform: rotate(-2.5deg) translate(-5px, -5px); opacity: 0; }

    /* ── SHARED CARD FACE ── */
    .cface {
      position: absolute;
      inset: 0;
      border-radius: var(--cr);
      border: 4px solid rgba(255,255,255,.4);
      box-shadow:
        0 14px 40px rgba(0,0,0,.44),
        0 2px 5px rgba(0,0,0,.2),
        inset 0 1px 0 rgba(255,255,255,.22);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(5px, 1.3vw, 11px);
    }

    /* ── BACK STYLE ── */
    .back-style {
      background: linear-gradient(148deg, #1E1E82 0%, #2C1870 50%, #180E44 100%);
    }
    .back-style::before {              /* diamond crosshatch */
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        repeating-linear-gradient( 45deg, rgba(255,255,255,.035) 0, rgba(255,255,255,.035) 1px, transparent 1px, transparent 10px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,.035) 0, rgba(255,255,255,.035) 1px, transparent 1px, transparent 10px);
    }
    .back-style::after {               /* golden frame */
      content: '';
      position: absolute;
      inset: clamp(7px, 1.6vw, 11px);
      border: 2px solid rgba(255,200,50,.3);
      border-radius: calc(var(--cr) - 4px);
    }
    .back-star {
      font-size: clamp(44px, 12vw, 82px);
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 14px rgba(255,215,0,.5));
      animation: starPulse 3s ease-in-out infinite;
    }
    @keyframes starPulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(255,215,0,.45)); }
      50%      { filter: drop-shadow(0 0 26px rgba(255,215,0,.9)); }
    }
    .back-brand {
      font-size: clamp(9px, 1.8vw, 14px);
      color: rgba(255,200,50,.62);
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .back-count {
      font-size: clamp(18px, 4vw, 34px);
      font-weight: 900;
      color: rgba(255,200,50,.48);
      position: relative; z-index: 1;
    }

    /* ── FRONT STYLE ── */
    /* No position:relative — .cface already provides position:absolute which
       also acts as containing block for the .corner children. Adding relative
       here would override inset:0 and shrink the card to its content height. */
    .corner {
      position: absolute;
      font-size: clamp(10px, 2vw, 16px);
      font-weight: 900;
      color: rgba(255,255,255,.65);
      line-height: 1;
    }
    .c-tl { top:  clamp(8px, 1.8vw, 14px); left:  clamp(8px, 1.8vw, 14px); }
    .c-tr { top:  clamp(8px, 1.8vw, 14px); right: clamp(8px, 1.8vw, 14px); font-size: clamp(8px,1.5vw,13px); color: rgba(255,255,255,.3); }
    .c-bl { bottom: clamp(8px,1.8vw,14px);  left:  clamp(8px, 1.8vw, 14px); font-size: clamp(8px,1.5vw,13px); color: rgba(255,255,255,.3); transform: rotate(180deg); }
    .c-br { bottom: clamp(8px,1.8vw,14px); right: clamp(8px, 1.8vw, 14px); transform: rotate(180deg); }
    .sound-text {
      font-size: clamp(38px, 12vw, 94px);
      font-weight: 900;
      color: #fff;
      text-shadow: 3px 4px 0 rgba(0,0,0,.22), 0 0 28px rgba(255,255,255,.15);
      letter-spacing: -1px;
      line-height: 1;
      text-align: center;
    }
    .cat-label {
      font-size: clamp(9px, 1.8vw, 15px);
      font-weight: bold;
      color: rgba(255,255,255,.78);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      padding: 0 10px;
    }
    /* Shine sweep (applied to fly-front and discard-top via JS after landing) */
    .shine::before {
      content: '';
      position: absolute;
      top: 0; left: -120%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: skewX(-15deg);
      animation: shine .6s ease-out forwards;
    }
    @keyframes shine {
      from { left: -120%; }
      to   { left:  200%; }
    }

    /* ── DECK-TOP (static back face in deck) ── */
    #deck-top { z-index: 4; cursor: pointer; }
    @keyframes deckPress {
      0%  { transform: scale(1)    translateY(0); }
      40% { transform: scale(.97)  translateY(3px); }
      100%{ transform: scale(1)    translateY(0); }
    }
    #deck-top.pressed { animation: deckPress .15s ease-out; }

    /* ── DECK EMPTY ── */
    #deck-empty {
      position: absolute;
      inset: 0;
      border-radius: var(--cr);
      border: 3px dashed rgba(255,255,255,.28);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      z-index: 4;
    }
    #deck-empty .de-icon { font-size: clamp(28px, 7vw, 52px); }
    #deck-empty .de-text { font-size: clamp(10px, 2vw, 16px); color: rgba(255,255,255,.45); font-weight: bold; }

    /* ── DISCARD EMPTY ── */
    #discard-empty {
      position: absolute;
      inset: 0;
      border-radius: var(--cr);
      border: 3px dashed rgba(255,255,255,.22);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    #discard-empty .de-text { font-size: clamp(10px, 2vw, 16px); color: rgba(255,255,255,.35); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-align: center; padding: 0 10px; }

    /* ── DISCARD TOP ── */
    #discard-top {
      display: none;
      z-index: 3;
    }

    /* ── FLYING CARD ── */
    #fly-wrap {
      position: absolute;
      width: var(--cw);
      height: var(--ch);
      display: none;
      z-index: 50;
      pointer-events: none;
      perspective: 1300px;
    }
    #fly-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }
    #fly-back  { backface-visibility: hidden; -webkit-backface-visibility: hidden; z-index: auto; }
    #fly-front {
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      transform: rotateY(180deg);
    }

    /* ── TAP HINT ── */
    #tap-hint {
      position: absolute;
      bottom: clamp(-32px, -7.5vw, -40px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.76);
      font-size: clamp(12px, 2.5vw, 18px);
      font-weight: bold;
      white-space: nowrap;
      pointer-events: none;
      animation: hintPulse 2.2s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%,100%{ opacity:.76; transform:translateX(-50%) scale(1); }
      50%    { opacity:.32; transform:translateX(-50%) scale(.95); }
    }

    /* ── UPDATE BUTTON ── */
    #update-btn {
      position: fixed;
      bottom: clamp(12px, 3vw, 20px);
      right:  clamp(12px, 3vw, 20px);
      width:  clamp(34px, 6vw, 44px);
      height: clamp(34px, 6vw, 44px);
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.55);
      font-size: clamp(16px, 3.5vw, 22px);
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      touch-action: manipulation;
      transition: background .15s, color .15s, transform .25s;
    }
    #update-btn:active {
      background: rgba(255,255,255,.32);
      color: #fff;
      transform: rotate(180deg);
    }

    /* ── WIN OVERLAY ── */
    #win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #win-overlay.show { display: flex; }
    .win-panel {
      background: linear-gradient(148deg, #FFD93D 0%, #FF6B6B 100%);
      border-radius: clamp(20px, 4.5vw, 36px);
      padding: clamp(26px, 5dvh, 54px) clamp(30px, 7vw, 72px);
      text-align: center;
      border: 5px solid rgba(255,255,255,.55);
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      max-width: min(86vw, 440px);
      animation: winPop .4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes winPop {
      from { transform: scale(.45); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .win-emoji { font-size: clamp(56px, 13vw, 90px); display: block; }
    .win-title { font-size: clamp(26px, 6vw, 48px); color: #fff; font-weight: 900; text-shadow: 3px 3px 0 rgba(0,0,0,.22); margin: 8px 0 4px; }
    .win-sub   { font-size: clamp(15px, 3vw, 24px); color: rgba(255,255,255,.94); margin-bottom: 20px; }
    .restart-btn {
      display: inline-block;
      padding: clamp(11px, 2.2dvh, 18px) clamp(26px, 6vw, 52px);
      font-size: clamp(15px, 3.2vw, 24px);
      font-family: inherit; font-weight: bold;
      background: #fff; color: #C0392B;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.22);
      transition: transform .1s, box-shadow .1s;
      touch-action: manipulation;
    }
    .restart-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.22); }

    /* ── CONFETTI ── */
    .confetto {
      position: fixed; pointer-events: none; border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);    opacity: 1; }
      100% { transform: translateY(110dvh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>

<body>
  <header>
    <h1>🃏 Klank Kaarten!</h1>
    <div id="timer-box"><span id="timer">0:00</span></div>
  </header>

  <div id="progress-area">
    <span id="progress-text">Tik op de stapel om te beginnen!</span>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="game-area">

    <!-- LEFT: Deck (face down) -->
    <div class="stack-wrap">
      <div class="stack" id="deck">
        <div class="ghost ghost-deck" id="g1"></div>
        <div class="ghost ghost-deck" id="g2"></div>
        <div class="ghost ghost-deck" id="g3"></div>

        <!-- Deck top card (back face) -->
        <div class="cface back-style" id="deck-top">
          <span class="back-star">⭐</span>
          <span class="back-brand">Klank Kaarten</span>
          <span class="back-count" id="back-count">45</span>
        </div>

        <!-- Empty deck indicator -->
        <div id="deck-empty">
          <span class="de-icon">✓</span>
          <span class="de-text">Leeg!</span>
        </div>

        <div id="tap-hint">👆 Tik of [spatie]</div>
      </div>
      <div class="stack-label" id="deck-label">Stapel (45)</div>
    </div>

    <!-- FLYING CARD (positioned absolute, shown only during animation) -->
    <div id="fly-wrap">
      <div id="fly-inner">
        <div class="cface back-style" id="fly-back">
          <span class="back-star">⭐</span>
          <span class="back-brand">Klank Kaarten</span>
        </div>
        <div class="cface front-style" id="fly-front">
          <div class="corner c-tl" id="fy-tl"></div>
          <div class="corner c-tr">✦</div>
          <div class="sound-text" id="fy-sound"></div>
          <div class="cat-label"  id="fy-cat"></div>
          <div class="corner c-bl">✦</div>
          <div class="corner c-br" id="fy-br"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Discard pile (face up) -->
    <div class="stack-wrap">
      <div class="stack" id="discard">
        <div class="ghost ghost-done" id="dg1"></div>
        <div class="ghost ghost-done" id="dg2"></div>

        <!-- Discard top card (face up) -->
        <div class="cface front-style" id="discard-top">
          <div class="corner c-tl" id="dt-tl"></div>
          <div class="corner c-tr">✦</div>
          <div class="sound-text" id="dt-sound"></div>
          <div class="cat-label"  id="dt-cat"></div>
          <div class="corner c-bl">✦</div>
          <div class="corner c-br" id="dt-br"></div>
        </div>

        <!-- Placeholder when discard is empty -->
        <div id="discard-empty"><span class="de-text">Omgedraaid</span></div>
      </div>
      <div class="stack-label" id="discard-label">Omgedraaid (0)</div>
    </div>

  </div><!-- #game-area -->

  <!-- Lower-right corner: clear cache & reload for latest version -->
  <button id="update-btn" onclick="hardRefresh()" title="Vernieuw app (wis cache)">⟳</button>

  <!-- Win overlay -->
  <div id="win-overlay">
    <div class="win-panel">
      <span class="win-emoji">🎉</span>
      <div class="win-title">Super gedaan!</div>
      <div class="win-sub">Alle 45 kaarten in <strong id="win-time"></strong>!</div>
      <button class="restart-btn" onclick="restart()">🔄 Opnieuw spelen</button>
    </div>
  </div>

  <script>
    /* ── DATA ─────────────────────────────────────── */
    const CATS = [
      { name:'Korte klanken', abbr:'KO', c1:'#E83E5A', c2:'#A31030', sounds:['a','e','o','u','i'] },
      { name:'Lange klanken', abbr:'LA', c1:'#1E88E5', c2:'#0D47A1', sounds:['aa','ee','oo','uu'] },
      { name:'Twee tekens',   abbr:'TW', c1:'#43A047', c2:'#1B5E20', sounds:['ei','ij','ie','au','ou','oe','eu','ui','uw','ch','ng','nk'] },
      { name:'Drie tekens',   abbr:'DR', c1:'#8E24AA', c2:'#4A148C', sounds:['aai','ooi','oei','auw','ouw'] },
      { name:'Vier tekens',   abbr:'VI', c1:'#D81B60', c2:'#880E4F', sounds:['eeuw','ieuw'] },
      { name:'Medeklinkers',  abbr:'ME', c1:'#E65100', c2:'#BF360C', sounds:['b','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','z'] },
    ];
    const MASTER = [];
    CATS.forEach(c => c.sounds.forEach(s => MASTER.push({ sound:s, name:c.name, abbr:c.abbr, c1:c.c1, c2:c.c2 })));

    /* ── STATE ────────────────────────────────────── */
    let deck = [], idx = 0;
    let state = 'idle'; // idle | done  (no 'animating' – overlapping flips allowed)
    let inFlight = 0;   // cards currently mid-air
    let elapsed = 0, timerOn = false, timerID = null;
    let audioCtx = null;

    /* ── DOM REFS ─────────────────────────────────── */
    const gameArea    = document.getElementById('game-area');
    const deckEl      = document.getElementById('deck');
    const deckTop     = document.getElementById('deck-top');
    const deckEmpty   = document.getElementById('deck-empty');
    const deckLabel   = document.getElementById('deck-label');
    const discardEl   = document.getElementById('discard');
    const discardTop  = document.getElementById('discard-top');
    const discardEmp  = document.getElementById('discard-empty');
    const discardLbl  = document.getElementById('discard-label');
    const backCount   = document.getElementById('back-count');
    const tapHint     = document.getElementById('tap-hint');

    /* ── AUDIO ────────────────────────────────────── */
    function ac() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function mkNoise(ctx, dur) {
      const sz  = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = (Math.random()*2-1)*(1-i/sz);
      const s = ctx.createBufferSource(); s.buffer = buf; return s;
    }
    function playFlip() {
      const ctx = ac(), t = ctx.currentTime;
      const n = mkNoise(ctx, .3);
      const f = ctx.createBiquadFilter(); f.type='bandpass';
      f.frequency.setValueAtTime(1300,t); f.frequency.exponentialRampToValueAtTime(320,t+.3); f.Q.value=2.5;
      const g = ctx.createGain(); g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.3);
      n.connect(f); f.connect(g); g.connect(ctx.destination); n.start(t);
      // thwap
      const o=ctx.createOscillator(), og=ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(165,t+.27); o.frequency.exponentialRampToValueAtTime(62,t+.44);
      og.gain.setValueAtTime(0,t+.25); og.gain.linearRampToValueAtTime(.28,t+.29); og.gain.exponentialRampToValueAtTime(.001,t+.48);
      o.connect(og); og.connect(ctx.destination); o.start(t+.25); o.stop(t+.52);
    }
    function playChime() {
      const ctx = ac();
      [523,659,784].forEach((f,i)=>{
        const t=ctx.currentTime+i*.09;
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.11,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.5);
        o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.6);
      });
    }
    function playFanfare() {
      const ctx = ac();
      [523,659,784,1047,1319].forEach((f,i)=>{
        const t=ctx.currentTime+i*.11;
        ['sine','square'].forEach((type,j)=>{
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.type=type; o.frequency.value=j===1?f*2:f;
          g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(j===0?.12:.04,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.62);
          o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.68);
        });
      });
    }

    /* ── TIMER ────────────────────────────────────── */
    const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    function startTimer() {
      if (timerOn) return; timerOn=true;
      timerID = setInterval(()=>{ elapsed++; document.getElementById('timer').textContent=fmt(elapsed); },1000);
    }
    function stopTimer() { clearInterval(timerID); timerOn=false; }

    /* ── SHUFFLE ──────────────────────────────────── */
    function shuffle(a) {
      const b=[...a];
      for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
      return b;
    }

    /* ── SOUND FONT SIZE ──────────────────────────── */
    function soundSize(sound, el) {
      const base = Math.min(window.innerWidth*0.16, 90);
      const l = sound.length;
      el.style.fontSize = l<=2?`${base}px`:l===3?`${base*.72}px`:`${base*.58}px`;
    }

    /* ── GHOST VISIBILITY ─────────────────────────── */
    function updateDeckGhosts(remaining) {
      const show = Math.min(remaining-1, 3);
      [['g3',.88],['g2',.72],['g1',.55]].forEach(([id,op],i)=>{
        document.getElementById(id).style.opacity = i<show ? op : 0;
      });
    }
    function updateDiscardGhosts(done) {
      document.getElementById('dg1').style.opacity = done>=3?.55:done>=2?.45:0;
      document.getElementById('dg2').style.opacity = done>=2?.75:0;
    }

    /* ── PROGRESS TEXT ────────────────────────────── */
    function updateProgress() {
      const total=deck.length, done=idx, left=total-done;
      let txt = done===0 ? `Tik op de stapel! (${total} kaarten)`
              : left===0 ? `Alle ${total} kaarten omgedraaid! 🎉`
              : left===1 ? `Nog 1 kaart — bijna klaar! 🌟`
              :            `${done} van ${total} kaarten omgedraaid`;
      document.getElementById('progress-text').textContent = txt;
      document.getElementById('progress-fill').style.width = `${done/total*100}%`;
      deckLabel.textContent    = `Stapel (${left})`;
      discardLbl.textContent   = `Omgedraaid (${done})`;
    }

    /* ── SET FRONT CONTENT ────────────────────────── */
    function setFront(el, card) {
      el.style.background = `linear-gradient(148deg,${card.c1} 0%,${card.c2} 100%)`;
      const s = el.querySelector('.sound-text');
      s.textContent = card.sound;
      soundSize(card.sound, s);
      el.querySelector('.cat-label').textContent = card.name;
      const corners = el.querySelectorAll('.c-tl,.c-br');
      corners.forEach(c => c.textContent = card.abbr);
    }

    /* ── EASE FUNCTION ────────────────────────────── */
    function easeInOut(t) {
      return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    }

    /* ── BUILD DYNAMIC FLY CARD ──────────────────── */
    function mkFlyCard(card) {
      const wrap = document.createElement('div');
      wrap.className = 'fly-card-anim';
      wrap.style.cssText = 'position:absolute;pointer-events:none;z-index:50;perspective:1300px;width:var(--cw);height:var(--ch);';

      const inner = document.createElement('div');
      inner.style.cssText = 'width:100%;height:100%;position:relative;transform-style:preserve-3d;';

      const back = document.createElement('div');
      back.className = 'cface back-style';
      back.style.cssText = 'backface-visibility:hidden;-webkit-backface-visibility:hidden;';
      back.innerHTML = '<span class="back-star">⭐</span><span class="back-brand">Klank Kaarten</span>';

      const front = document.createElement('div');
      front.className = 'cface front-style';
      front.style.cssText = 'backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);';
      front.innerHTML = `<div class="corner c-tl">${card.abbr}</div><div class="corner c-tr">✦</div><div class="sound-text"></div><div class="cat-label">${card.name}</div><div class="corner c-bl">✦</div><div class="corner c-br">${card.abbr}</div>`;
      front.style.background = `linear-gradient(148deg,${card.c1} 0%,${card.c2} 100%)`;
      const sEl = front.querySelector('.sound-text');
      sEl.textContent = card.sound;
      soundSize(card.sound, sEl);

      inner.appendChild(back);
      inner.appendChild(front);
      wrap.appendChild(inner);
      return { wrap, inner };
    }

    /* ── FLIP ─────────────────────────────────────── */
    function flip() {
      if (state === 'done' || idx >= deck.length) return;
      startTimer();

      const card = deck[idx];
      idx++;
      inFlight++;

      // Deck press feedback
      deckTop.classList.add('pressed');
      setTimeout(() => deckTop.classList.remove('pressed'), 150);

      // Update deck display immediately
      const remaining = deck.length - idx;
      backCount.textContent = remaining;
      if (remaining <= 0) {
        deckTop.style.display   = 'none';
        deckEmpty.style.display = 'flex';
        tapHint.style.display   = 'none';
      } else {
        updateDeckGhosts(remaining);
      }
      updateProgress();

      // Create a fresh fly-card element for this flip
      const { wrap, inner } = mkFlyCard(card);
      gameArea.appendChild(wrap);

      const areaR = gameArea.getBoundingClientRect();
      const deckR  = deckEl.getBoundingClientRect();
      const disR   = discardEl.getBoundingClientRect();
      const sx = deckR.left - areaR.left, sy = deckR.top - areaR.top;
      const ex = disR.left  - areaR.left, ey = disR.top  - areaR.top;
      const dx = ex - sx, dy = ey - sy;

      wrap.style.left = sx + 'px';
      wrap.style.top  = sy + 'px';

      const DUR = 360, ARC = 55;
      const start = performance.now();
      let chimeDone = false;

      playFlip();

      function step(now) {
        const raw = Math.min((now - start) / DUR, 1);
        const e   = easeInOut(raw);
        const arc = -ARC * 4 * raw * (1 - raw);
        wrap.style.transform  = `translate(${dx*e}px,${dy*e+arc}px)`;
        inner.style.transform = `rotateY(${-180*e}deg)`;
        if (!chimeDone && raw >= .5) { chimeDone = true; playChime(); }
        if (raw < 1) requestAnimationFrame(step);
        else onLanded(card, wrap);
      }
      requestAnimationFrame(step);
    }

    /* ── CARD LANDED ──────────────────────────────── */
    function onLanded(card, flyEl) {
      inFlight--;
      flyEl.remove();

      setFront(discardTop, card);
      discardTop.style.display = 'flex';
      discardEmp.style.display = 'none';
      discardTop.classList.remove('shine');
      void discardTop.offsetWidth;
      discardTop.classList.add('shine');
      updateDiscardGhosts(idx);

      // Game ends only when every card has been initiated AND every one has landed
      if (idx >= deck.length && inFlight === 0) {
        setTimeout(gameOver, 200);
      }
    }

    /* ── GAME OVER ────────────────────────────────── */
    function gameOver() {
      stopTimer();
      state = 'done';
      document.getElementById('win-time').textContent = fmt(elapsed);
      document.getElementById('win-overlay').classList.add('show');
      updateProgress();
      playFanfare();
      spawnConfetti();
    }

    /* ── CONFETTI ─────────────────────────────────── */
    function spawnConfetti() {
      const cols = ['#FF6B6B','#FFD93D','#6BCB77','#4FC3F7','#C77DFF','#FFB347'];
      for (let i=0; i<88; i++) {
        setTimeout(()=>{
          const c = document.createElement('div');
          c.className = 'confetto';
          const sz = Math.random()*11+6;
          c.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${(Math.random()*1.6+1.4).toFixed(2)}s;animation-delay:${(Math.random()*.9).toFixed(2)}s;`;
          document.body.appendChild(c);
          setTimeout(()=>c.remove(), 4500);
        }, i*38);
      }
    }

    /* ── RESTART ──────────────────────────────────── */
    function restart() {
      // Drop any cards still mid-air
      gameArea.querySelectorAll('.fly-card-anim').forEach(el => el.remove());
      inFlight = 0;

      deck = shuffle(MASTER); idx=0; elapsed=0; timerOn=false;
      clearInterval(timerID);

      document.getElementById('timer').textContent = '0:00';
      document.getElementById('win-overlay').classList.remove('show');

      // Reset deck
      deckTop.style.display   = '';
      deckEmpty.style.display = 'none';
      tapHint.style.display   = '';
      backCount.textContent   = deck.length;
      updateDeckGhosts(deck.length);

      // Reset discard
      discardTop.style.display = 'none';
      discardEmp.style.display = 'flex';
      ['dg1','dg2'].forEach(id=>document.getElementById(id).style.opacity=0);

      state = 'idle';
      updateProgress();
    }

    /* ── HARD REFRESH ────────────────────────────── */
    async function hardRefresh() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      location.reload(true);
    }

    /* ── INIT ─────────────────────────────────────── */
    (function init() {
      deck = shuffle(MASTER);
      updateDeckGhosts(deck.length);
      updateProgress();

      // Tap / click on deck
      deckEl.addEventListener('click', flip);

      // Spacebar
      document.addEventListener('keydown', e => {
        if (e.code === 'Space') { e.preventDefault(); flip(); }
      });

      // Unlock AudioContext on first touch (iOS)
      document.addEventListener('touchstart', ()=>{ try{ ac(); }catch(e){} }, { once:true, passive:true });

      // Resize: recalc font size of the last-landed discard card
      window.addEventListener('resize', ()=>{
        if (idx > 0) {
          const s = document.getElementById('dt-sound');
          if (s) soundSize(s.textContent, s);
        }
      });

      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
    })();
  </script>
</body>
</html>
